name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Delete existing release if any
        run: gh release delete "${{ inputs.tag }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${{ inputs.tag }}" --title "${{ inputs.tag }}" --notes-file RELEASE-NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
