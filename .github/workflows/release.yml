name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update plugin version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" .claude-plugin/plugin.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" .claude-plugin/marketplace.json

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release notes for this version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^$TAG$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            # First release or no previous tag — use full section from RELEASE-NOTES.md
            sed -n "/^## $TAG/,/^## v/{ /^## v[^$]/!p; }" RELEASE-NOTES.md | sed '$ d' > /tmp/release-notes.txt
          else
            sed -n "/^## $TAG/,/^## v/{ /^## v[^$]/!p; }" RELEASE-NOTES.md | sed '$ d' > /tmp/release-notes.txt
          fi
          # Fallback: if extraction is empty, generate from commits
          if [ ! -s /tmp/release-notes.txt ]; then
            echo "## What's Changed" > /tmp/release-notes.txt
            echo "" >> /tmp/release-notes.txt
            git log --pretty=format:"- %s" ${PREV_TAG:+$PREV_TAG..}$TAG >> /tmp/release-notes.txt
          fi

      - name: Delete existing release if any
        run: gh release delete "${{ steps.version.outputs.tag }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${{ steps.version.outputs.tag }}" --title "${{ steps.version.outputs.tag }}" --notes-file /tmp/release-notes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
